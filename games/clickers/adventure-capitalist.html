<!doctype html>
<html lang="en-us">
<head>
  <base href="https://rawcdn.githack.com/selenite-cc/selenite-old/9c743188888af0986c8c7b293dbac8f9e421a4ee/adventure-capitalist/">
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="author" content="Hyper Hippo Games">
  <title>AdVenture Capitalist!</title>
  <link rel="stylesheet" href="TemplateData/style.css">
</head>
<body class="template">
  <div class="webgl-content">
    <div
      id="unityContainer"
      style="width: 960px; height: 600px; padding: 0; margin: 0; border: 0; position: relative; background: rgb(35, 31, 32);"
    >
      <canvas
        class="emscripten"
        id="canvas"
        width="335"
        height="667"
        style="width: 100%; height: 100%; background: #231F20"
        oncontextmenu="event.preventDefault()"
      ></canvas>

      <div id="loadingBox">
        <div id="bgBar"></div>
        <div id="progressBar"></div>
        <p id="loadingInfo">Loading...</p>
      </div>
    </div>
  </div>

  <script src="TemplateData/UnityProgress.js"></script>
  <script>
    var canvas = document.getElementById("canvas");
    var Module = {
      TOTAL_MEMORY: 201326592,
      filePackagePrefixURL: "Release/",
      memoryInitializerPrefixURL: "Release/",
      preRun: [],
      postRun: [],
      print: function () {
        return function (text) {
          console.log(text);
        };
      }(),
      printErr: function (text) {
        console.error(text);
      },
      canvas: canvas,
      progress: null,
      setStatus: function (text) {
        if (this.progress == null) {
          if (typeof UnityProgress !== "function") {
            return;
          }
          this.progress = new UnityProgress(canvas);
        }
        if (!Module.setStatus.last) {
          Module.setStatus.last = {
            time: Date.now(),
            text: ""
          };
        }
        if (text === Module.setStatus.text) {
          return;
        }
        this.progress.SetMessage(text);
        var match = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
        if (match) {
          this.progress.SetProgress(parseInt(match[2], 10) / parseInt(match[4], 10));
        }
        if (text === "") {
          this.progress.Clear();
        }
      },
      totalDependencies: 0,
      monitorRunDependencies: function (left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);
        Module.setStatus(
          left
            ? "Preparing... (" + (this.totalDependencies - left) + "/" + this.totalDependencies + ")"
            : "All downloads complete."
        );
      }
    };
    Module.setStatus("Downloading (0.0/1)");
  </script>
  <script src="Release/UnityConfig.js"></script>
  <script src="Release/fileloader.js"></script>
  <script>
    if (!console.logError) {
      console.logError = function () {
        console.error.apply(console, arguments);
      };
    }
  </script>
  <script>
    if (Math.fround) {
      var directScript = document.createElement("script");
      directScript.src = "Release/webgl.js";
      document.body.appendChild(directScript);
    } else {
      var codeXHR = new XMLHttpRequest();
      codeXHR.open("GET", "Release/webgl.js", true);
      codeXHR.onload = function () {
        var code = codeXHR.responseText;
        if (!Math.fround) {
          try {
            console.log("optimizing out Math.fround calls");
            var minifiedName = /var ([^=]+)=global\.Math\.fround;/.exec(code)[1];
            var startAsm = code.indexOf("// EMSCRIPTEN_START_FUNCS");
            var endAsm = code.indexOf("// EMSCRIPTEN_END_FUNCS");
            var asm = code.substring(startAsm, endAsm);
            var changed;
            do {
              changed = false;
              asm = asm.replace(new RegExp("[^a-zA-Z0-9\\$\\_]" + minifiedName + "\\(", "g"), function (match) {
                changed = true;
                return match[0] + "(";
              });
            } while (changed);
            code = code.substring(0, startAsm) + asm + code.substring(endAsm);
            code = code.replace("'use asm'", "'almost asm'");
          } catch (error) {
            console.log("failed to optimize out Math.fround calls " + error);
          }
        }

        var blob = new Blob([code], { type: "text/javascript" });
        var optimizedScript = document.createElement("script");
        optimizedScript.src = URL.createObjectURL(blob);
        optimizedScript.onload = function () {
          URL.revokeObjectURL(optimizedScript.src);
        };
        document.body.appendChild(optimizedScript);
      };
      codeXHR.send(null);
    }
  </script>
</body>
</html>
